<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Começar Teste Grátis - Meu SaaS</title>
</head>
<body>
    <h1>Crie a conta da sua Construtora</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Criar Minha Conta e Acessar</button>
    </form>
    <p>Já tem conta? <a href="{% url 'login' %}">Faça login</a></p>
</body>
</html>
